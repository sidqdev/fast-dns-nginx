server {
    listen 80;
    server_name {% for record in records%}{{record.dns}} {% endfor %};

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

{% for record in records %}
{% if record.has_cert %}
server {
    listen 443 ssl;
    server_name {{ record.dns }};
    ssl_certificate /etc/letsencrypt/live/{{ record.dns }}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/{{ record.dns }}/privkey.pem;

    location / {
        proxy_pass {{ record.redirect_host }};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
{% endif %}
{% endfor %} 
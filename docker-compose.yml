version: "3.9"

services:
  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx

    container_name: nginx
    restart: unless-stopped
    volumes:
      - ./conf:/etc/nginx/conf.d
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"

  certbot:
    build:
      context: .
      dockerfile: Dockerfile.certbot
    container_name: certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    depends_on: 
      - nginx